<!DOCTYPE html>
<html>

<head>

    <title>ResearchMind AI Login</title>

    <link rel="stylesheet"
          href="/static/css/login.css">

</head>

<body>

<div class="login-container">

    <h1>ResearchMind AI</h1>

    <h3>Research Paper Assistant</h3>

    <form action="/login"
          method="post">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <button type="submit">

            Login

        </button>

    </form>

</div>

</body>

</html>
