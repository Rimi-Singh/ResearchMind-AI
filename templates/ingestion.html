<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ResearchMind.ai - Research Paper Ingestion</title>

    <link rel="stylesheet"
          href="/static/css/ingestion.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

    <div class="container">

        <div class="card">

            <h1>

                <i class="bi bi-database-fill"></i>

                ResearchMind.ai Ingestion

            </h1>

            <p class="subtitle">

                Upload research papers to extend the knowledge base.

            </p>

            <hr>

            <!-- ================= Upload PDF ================= -->

            <h2>

                <i class="bi bi-upload"></i>

                Upload Research Papers

            </h2>

            <form
                action="/upload"
                method="post"
                enctype="multipart/form-data">

                <input
                    type="file"
                    name="file"
                    accept=".pdf"
                    required>

                <button type="submit">

                    <i class="bi bi-cloud-arrow-up"></i>

                    Upload PDF

                </button>

            </form>

            <p class="note">

                <i class="bi bi-info-circle"></i>

                Uploaded PDFs are automatically indexed and added to the vector database.

            </p>

            <hr>

            <a href="/dashboard" class="back-link">

                <i class="bi bi-arrow-left"></i>

                Back to ResearchMind AI

            </a>

        </div>

    </div>

</body>

</html>
